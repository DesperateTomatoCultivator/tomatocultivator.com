<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomato Cultivator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; background: #f5f5f5; }
    header { padding: 12px 20px; background: #c0392b; color: white; font-size: 1.1rem; font-weight: bold; }
    iframe { flex: 1; border: none; width: 100%; }
    .fallback { display: none; padding: 40px; text-align: center; }
    @media (max-width: 600px) {
      .fallback { display: block; }
      iframe { display: none; }
    }
  </style>
</head>
<body>
  <header>tomatocultivator.com</header>
  <iframe src="test.pdf" title="Tomato Cultivator Paper"></iframe>
  <div class="fallback">
    <p>Your browser may not support inline PDFs.</p>
    <p style="margin-top:12px"><a href="test.pdf">Download the PDF</a></p>
  </div>
</body>
</html>
